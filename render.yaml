services:
  - type: web
    name: hcp-ai-crm-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: "production"
      - key: APP_VERSION
        value: "1.1.0"
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "gemma2-9b-it"
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: TRUSTED_HOSTS
        value: "localhost,127.0.0.1,*.onrender.com"
      - key: SEED_DEMO_DATA
        value: "true"
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "10"
